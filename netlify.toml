[build]
  command = "npm run build"
  publish = "dist"

# Force non-www -> www (301 permanent redirect)
[[redirects]]
  from = "https://buildwithportal.com/*"
  to = "https://www.buildwithportal.com/:splat"
  status = 301
  force = true

# Redirect old Wix URLs to relevant new pages
[[redirects]]
  from = "/service-page/ready-mixed-concrete-delivery"
  to = "/services"
  status = 301

[[redirects]]
  from = "/service-page/*"
  to = "/services"
  status = 301

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
