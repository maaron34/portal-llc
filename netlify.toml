[build]
  # Per-route prerendering via Playwright. Layered safeguards:
  #
  # 1. The prerender script pins `vite preview --host 127.0.0.1` and uses
  #    `http://127.0.0.1:...` in fetch URLs. Avoids the localhost → IPv6
  #    mismatch that caused 12+ minute hangs in earlier attempts (vite
  #    binds IPv4, fetch resolves IPv6 in Netlify's dual-stack containers).
  # 2. `timeout 240` is the hard kill switch — if anything still hangs past
  #    4 minutes, GNU coreutils sends SIGTERM and the outer `||` fallback
  #    runs `build:no-prerender`, shipping PR #1's state.
  #
  # IMPORTANT: do NOT pass `--with-deps` to playwright install. It tries to
  # `su` to root to run apt-get, and Netlify's build user has no sudo
  # password — confirmed in the build log of commit 6f46672:
  #     Switching to root user to install dependencies...
  #     Password: su: Authentication failure
  #     Failed to install browsers
  # Netlify's build image already ships the libraries Chromium needs (it
  # supports legacy Prerender.io integrations, so libnss3 et al. are baked
  # in). Plain `playwright install chromium` works without root.
  command = """
    timeout 240 sh -c 'echo "--- Installing Chromium ---" && npx playwright install chromium && echo "--- Full build (vite + prerender) ---" && npm run build' || (echo "!!! Prerender path failed or timed out — falling back to no-prerender build !!!" && npm run build:no-prerender)
  """
  publish = "dist"

[build.environment]
  # Pin Node to a current LTS. Node 18.x is EOL and has known interactions
  # with recent Chromium versions in Playwright (browser launch hang during
  # sandbox init).
  NODE_VERSION = "22"
  # Prefer IPv4 DNS results so any stray `localhost` lookup we may have
  # missed in the prerender script resolves to 127.0.0.1, not ::1.
  NODE_OPTIONS = "--dns-result-order=ipv4first"

# Force www -> non-www (301 permanent redirect)
# Netlify's domain settings use buildwithportal.com as primary (non-www)
# This redirect must match that direction to avoid a redirect loop
[[redirects]]
  from = "https://www.buildwithportal.com/*"
  to = "https://buildwithportal.com/:splat"
  status = 301
  force = true

# Redirect old Wix URLs to relevant new pages
[[redirects]]
  from = "/service-page/ready-mixed-concrete-delivery"
  to = "/services"
  status = 301

[[redirects]]
  from = "/service-page/*"
  to = "/services"
  status = 301

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
