[build]
  # Playwright is used for per-route prerendering (scripts/prerender.mjs).
  # Netlify CI doesn't pre-install Chromium, so we install it explicitly
  # before the build. The download (~175MB Chrome + 113MB headless shell)
  # is cached between builds. --with-deps is NOT needed — Netlify's build
  # image already has the system libraries Chromium requires.
  #
  # Resilient fallback: if any step fails (install, vite build, or prerender),
  # fall back to `build:no-prerender` so the site still deploys. The previous
  # state (static schema + sync title from PR #1) is the worst-case shipped
  # output. Diagnostic echoes make the failure mode visible in the build log.
  command = """
    (echo '--- Installing Chromium for Playwright ---' && \
     npx playwright install chromium && \
     echo '--- Full build (vite + prerender) ---' && \
     npm run build) || \
    (echo '!!! Prerender path failed, falling back to no-prerender build !!!' && \
     npm run build:no-prerender)
  """
  publish = "dist"

# Force www -> non-www (301 permanent redirect)
# Netlify's domain settings use buildwithportal.com as primary (non-www)
# This redirect must match that direction to avoid a redirect loop
[[redirects]]
  from = "https://www.buildwithportal.com/*"
  to = "https://buildwithportal.com/:splat"
  status = 301
  force = true

# Redirect old Wix URLs to relevant new pages
[[redirects]]
  from = "/service-page/ready-mixed-concrete-delivery"
  to = "/services"
  status = 301

[[redirects]]
  from = "/service-page/*"
  to = "/services"
  status = 301

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
